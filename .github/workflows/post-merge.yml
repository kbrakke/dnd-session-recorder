name: Post-Merge CI

on:
  push:
    branches: [main, staging]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - workflows
          - integration

env:
  NODE_VERSION: '22'

permissions:
  contents: read
  issues: write

jobs:
  # Check if files have changed that require comprehensive testing
  changes:
    name: Check Changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'prisma/**'
              - 'public/**'
              - '*.config.*'
              - '*.json'
              - '*.ts'
              - '*.tsx'
            tests:
              - 'tests/**'
              - 'playwright.config.*'
            workflows:
              - '.github/workflows/**'

  # Comprehensive workflow tests (the ones removed from PR CI)
  workflow-tests:
    name: Workflow Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.tests == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment
        run: |
          echo "NEXTAUTH_SECRET=test-secret-for-ci-workflows-32characters" >> .env.local
          echo "NEXTAUTH_URL=http://localhost:3000" >> .env.local
          echo "DATABASE_URL=file:./prisma/data/workflow-test.db" >> .env.local
          echo "OPENAI_API_KEY=sk-test-key-placeholder" >> .env.local
          echo "NEXT_TELEMETRY_DISABLED=1" >> .env.local

      - name: Setup test database
        run: |
          mkdir -p prisma/data
          touch prisma/data/workflow-test.db
        
      - name: Push database schema  
        run: npx prisma db push
        env:
          DATABASE_URL: "file:./prisma/data/workflow-test.db"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run comprehensive workflow tests
        run: npm run test:workflows
        env:
          CI: true
          NEXTAUTH_SECRET: test-secret-for-ci-workflows-32characters
          DATABASE_URL: "file:./prisma/data/workflow-test.db"
          MOCK_AI_SERVICES: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-test-results-${{ github.run_id }}
          path: |
            playwright-report-workflows/
            test-results/
          retention-days: 14

  # Deploy to staging and run comprehensive tests
  staging-deployment:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [workflow-tests, changes]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    environment: staging
    outputs:
      staging_url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io Staging
        id: deploy
        run: |
          flyctl deploy --config fly.staging.toml --remote-only
          echo "url=https://dnd-recorder-staging.fly.dev" >> $GITHUB_OUTPUT
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wait for deployment to be healthy
        run: |
          echo "⏳ Waiting for staging deployment to be healthy..."
          for i in {1..30}; do
            if curl -f -s https://dnd-recorder-staging.fly.dev/api/health; then
              echo "✅ Staging deployment is healthy!"
              break
            fi
            echo "Attempt $i/30 - waiting 10 seconds..."
            sleep 10
          done

  # Integration tests against staging
  staging-tests:
    name: Staging Integration Tests
    runs-on: ubuntu-latest
    needs: [staging-deployment, changes]
    if: needs.staging-deployment.result == 'success'
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run post-deploy tests against staging
        run: npm run test:post-deploy
        env:
          CI: true
          DEPLOY_URL: ${{ needs.staging-deployment.outputs.staging_url }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET_STAGING }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run integration tests against staging
        run: npx playwright test tests/integration/
        env:
          CI: true
          DEPLOY_URL: ${{ needs.staging-deployment.outputs.staging_url }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET_STAGING }}
          DATABASE_URL: ${{ secrets.DATABASE_URL_POSTGRES }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload staging test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: staging-test-results-${{ github.run_id }}
          path: |
            test-results-post-deploy/
            playwright-report/
            test-results/
          retention-days: 14

      - name: Staging smoke tests
        run: |
          echo "🔍 Running staging smoke tests..."
          
          # Test main pages
          curl -f ${{ needs.staging-deployment.outputs.staging_url }}/ || exit 1
          curl -f ${{ needs.staging-deployment.outputs.staging_url }}/auth/signin || exit 1
          
          # Test API endpoints
          curl -f ${{ needs.staging-deployment.outputs.staging_url }}/api/health || exit 1
          
          echo "✅ All smoke tests passed!"

  # Performance and load testing
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [workflow-tests]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application for performance testing
        run: npm run build
        env:
          NEXTAUTH_SECRET: test-secret-for-perf-32characters
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: file:./prisma/data/perf-test.db
          NODE_ENV: production

      - name: Run performance tests
        run: |
          # Add performance testing commands here
          echo "Performance tests would run here"
          # Example: npm run test:performance

  # Report results
  report-status:
    name: Report Test Status
    runs-on: ubuntu-latest
    needs: [workflow-tests, staging-deployment, staging-tests]
    if: always()
    steps:
      - name: Report comprehensive test results
        run: |
          echo "## Post-Merge Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow Tests | ${{ needs.workflow-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Staging Deployment | ${{ needs.staging-deployment.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Staging Integration Tests | ${{ needs.staging-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Add staging URL if deployment succeeded
          if [ "${{ needs.staging-deployment.result }}" = "success" ]; then
            echo "🚀 **Staging URL:** https://dnd-recorder-staging.fly.dev" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.workflow-tests.result }}" = "failure" ] || [ "${{ needs.staging-deployment.result }}" = "failure" ] || [ "${{ needs.staging-tests.result }}" = "failure" ]; then
            echo "❌ Some comprehensive tests or deployment failed. Please check the results." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ All comprehensive tests and deployment passed successfully!" >> $GITHUB_STEP_SUMMARY
          fi