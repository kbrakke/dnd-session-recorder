name: Post-Merge CI

on:
  push:
    branches: [main, staging]
  schedule:
    # Run nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - workflows
          - integration

env:
  NODE_VERSION: '22'

permissions:
  contents: read
  issues: write

jobs:
  # Check if files have changed that require comprehensive testing
  changes:
    name: Check Changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'prisma/**'
              - 'public/**'
              - '*.config.*'
              - '*.json'
              - '*.ts'
              - '*.tsx'
            tests:
              - 'tests/**'
              - 'playwright.config.*'
            workflows:
              - '.github/workflows/**'

  # Comprehensive workflow tests (the ones removed from PR CI)
  workflow-tests:
    name: Workflow Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.tests == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment
        run: |
          echo "NEXTAUTH_SECRET=test-secret-for-ci-workflows-32characters" >> .env.local
          echo "NEXTAUTH_URL=http://localhost:3000" >> .env.local
          echo "DATABASE_URL=file:./prisma/data/workflow-test.db" >> .env.local
          echo "OPENAI_API_KEY=sk-test-key-placeholder" >> .env.local
          echo "NEXT_TELEMETRY_DISABLED=1" >> .env.local

      - name: Setup test database
        run: |
          mkdir -p prisma/data
          touch prisma/data/workflow-test.db
        
      - name: Push database schema  
        run: npx prisma db push
        env:
          DATABASE_URL: "file:./prisma/data/workflow-test.db"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run comprehensive workflow tests
        run: npm run test:workflows
        env:
          CI: true
          NEXTAUTH_SECRET: test-secret-for-ci-workflows-32characters
          DATABASE_URL: "file:./prisma/data/workflow-test.db"
          MOCK_AI_SERVICES: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: workflow-test-results-${{ github.run_id }}
          path: |
            playwright-report-workflows/
            test-results/
          retention-days: 14

  # Integration tests with real services
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.tests == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment
        run: |
          echo "NEXTAUTH_SECRET=test-secret-for-ci-integration-32characters" >> .env.local
          echo "NEXTAUTH_URL=http://localhost:3000" >> .env.local
          echo "DATABASE_URL=file:./prisma/data/integration-test.db" >> .env.local
          echo "OPENAI_API_KEY=sk-test-key-placeholder" >> .env.local
          echo "NEXT_TELEMETRY_DISABLED=1" >> .env.local

      - name: Setup test database
        run: |
          mkdir -p prisma/data
          touch prisma/data/integration-test.db
        
      - name: Push database schema  
        run: npx prisma db push
        env:
          DATABASE_URL: "file:./prisma/data/integration-test.db"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run integration tests
        run: npx playwright test tests/integration/
        env:
          CI: true
          NEXTAUTH_SECRET: test-secret-for-ci-integration-32characters
          DATABASE_URL: "file:./prisma/data/integration-test.db"

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results-${{ github.run_id }}
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # Performance and load testing
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [workflow-tests]
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application for performance testing
        run: npm run build
        env:
          NEXTAUTH_SECRET: test-secret-for-perf-32characters
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: file:./prisma/data/perf-test.db
          NODE_ENV: production

      - name: Run performance tests
        run: |
          # Add performance testing commands here
          echo "Performance tests would run here"
          # Example: npm run test:performance

  # Report results
  report-status:
    name: Report Test Status
    runs-on: ubuntu-latest
    needs: [workflow-tests, integration-tests]
    if: always()
    steps:
      - name: Report comprehensive test results
        run: |
          echo "## Post-Merge Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Workflow Tests | ${{ needs.workflow-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration Tests | ${{ needs.integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.workflow-tests.result }}" = "failure" ] || [ "${{ needs.integration-tests.result }}" = "failure" ]; then
            echo "❌ Some comprehensive tests failed. Please check the test results." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ All comprehensive tests passed successfully!" >> $GITHUB_STEP_SUMMARY
          fi