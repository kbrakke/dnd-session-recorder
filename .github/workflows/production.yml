name: Release & Deploy Production

# Manual production release. Run from Actions ▸ "Release & Deploy Production" ▸
# Run workflow, after the target commit on `main` is green on staging.
#
# Single job by design: a tag created with the default GITHUB_TOKEN does NOT
# trigger `on: push: tags` workflows (GitHub blocks that recursion), so the
# release tag AND the prod deploy must happen in the same run.
on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Semver bump for this release'
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major

env:
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PROD_URL: https://dnd-recorder-prod.fly.dev

permissions:
  contents: write        # create the tag + GitHub Release
  packages: write        # push the scanned image to GHCR
  security-events: write # upload the Trivy SARIF

jobs:
  release:
    name: Release & Deploy
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://dnd-recorder-prod.fly.dev
    steps:
      - name: Checkout (full history for git-cliff)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # --- Dependency audit gate (fail before we build/ship) ---
      # Prod blocks on HIGH+ only (PR + staging gate at moderate); lows never
      # block. npm audit reads package-lock.json, so no install is needed.
      - name: Setup Node.js (for audit)
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit dependencies
        run: npm audit --audit-level high

      # --- Version & release notes (computed before we ship; published after) ---
      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          latest="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [ -z "$latest" ]; then
            major=0; minor=0; patch=0
          else
            v="${latest#v}"
            major="${v%%.*}"; rest="${v#*.}"; minor="${rest%%.*}"; patch="${rest##*.}"
          fi
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          next="v${major}.${minor}.${patch}"
          echo "version=${next}" >> "$GITHUB_OUTPUT"
          echo "Releasing ${next} (previous: ${latest:-none})"

      - name: Generate release notes (git-cliff)
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --unreleased --tag ${{ steps.version.outputs.version }} --strip header
        env:
          OUTPUT: RELEASE_NOTES.md

      # --- Build & scan the image before it ships ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build production image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan (report-only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      # --- Deploy to production ---
      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Production (blue-green)
        run: flyctl deploy --config fly.toml --remote-only --strategy bluegreen
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Run database migrations
        run: flyctl ssh console --config fly.toml -C "cd /app && npx prisma migrate deploy"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Health & smoke checks
        run: |
          set -euo pipefail
          echo "Waiting for production health..."
          ok=""
          for i in $(seq 1 10); do
            if curl -fsS --max-time 10 "${PROD_URL}/api/health"; then ok=1; break; fi
            echo "health attempt $i/10 — waiting 10s..."
            sleep 10
          done
          if [ "${ok}" != "1" ]; then
            echo "::error::Production health never came up"; exit 1
          fi
          curl -fsS --max-time 10 "${PROD_URL}/" > /dev/null || exit 1
          curl -fsS --max-time 10 "${PROD_URL}/auth/signin" > /dev/null || exit 1
          echo "✅ Production healthy"

      # --- Publish the release ONLY after prod is confirmed up ---
      - name: Create tag & GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          target_commitish: ${{ github.sha }}
          make_latest: true

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::warning::Release/deploy failed — rolling back production"
          flyctl releases rollback --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
