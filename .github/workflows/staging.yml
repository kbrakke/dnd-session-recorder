name: Staging Deployment

# Continuous staging: every push to `main` runs the comprehensive suite, deploys
# to the staging environment, and runs the post-deploy suite against it. Staging
# is an environment, not a branch — there is no `staging` branch.
#
# The nightly `schedule` runs the comprehensive suite ONLY (no deploy) as a drift
# check. Production is shipped separately and manually via production.yml.
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  STAGING_URL: https://dnd-recorder-staging.fly.dev

permissions:
  contents: read

jobs:
  changes:
    name: Check Changes
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      tests: ${{ steps.filter.outputs.tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Check for file changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'prisma/**'
              - 'public/**'
              - '*.config.*'
              - '*.json'
              - '*.ts'
              - '*.tsx'
            tests:
              - 'tests/**'
              - 'playwright.config.*'

  # Dependency audit — same gate as the PR (moderate). Staging redeploys on every
  # push to main, so this re-checks against advisories disclosed since the PR
  # merged. npm audit reads package-lock.json; no install needed.
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit dependencies
        run: npm audit --audit-level moderate

  # Comprehensive workflow tests (testcontainers + mocked AI) — the heavier suite
  # that does NOT run on the PR fast gate.
  workflow-tests:
    name: Comprehensive Tests
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.tests == 'true' || github.event_name != 'push'
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test environment
        run: |
          echo "NEXTAUTH_SECRET=test-secret-for-ci-workflows-32characters" >> .env.local
          echo "NEXTAUTH_URL=http://localhost:3000" >> .env.local
          echo "OPENAI_API_KEY=sk-test-key-placeholder" >> .env.local
          echo "NEXT_TELEMETRY_DISABLED=1" >> .env.local
          # DATABASE_URL is provided by testcontainers

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run comprehensive workflow tests
        run: npm run test:workflows
        env:
          CI: true
          NEXTAUTH_SECRET: test-secret-for-ci-workflows-32characters
          MOCK_AI_SERVICES: true
          # DATABASE_URL set by testcontainers

      - name: Upload test results
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: workflow-test-results-${{ github.run_id }}
          path: |
            playwright-report-workflows/
            test-results/
          retention-days: 14

  # Deploy main to the staging environment (push events only — the nightly
  # schedule must not redeploy).
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [changes, workflow-tests, security-audit]
    if: github.event_name == 'push' && (needs.changes.outputs.src == 'true' || needs.changes.outputs.tests == 'true')
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io Staging
        run: flyctl deploy --config fly.staging.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wait for staging to be healthy
        run: |
          set -euo pipefail
          echo "Waiting for staging health..."
          ok=""
          for i in $(seq 1 30); do
            if curl -fsS --max-time 10 "${STAGING_URL}/api/health"; then ok=1; break; fi
            echo "health attempt $i/30 — waiting 10s..."
            sleep 10
          done
          if [ "${ok}" != "1" ]; then
            echo "::error::Staging health never came up"; exit 1
          fi
          curl -fsS --max-time 10 "${STAGING_URL}/" > /dev/null || exit 1
          curl -fsS --max-time 10 "${STAGING_URL}/auth/signin" > /dev/null || exit 1
          echo "✅ Staging healthy"

  # Post-deploy suite against the deployed staging environment (stage 3:
  # only what can't be tested locally — real Fly env, real JWT, whitelist).
  staging-tests:
    name: Staging Post-Deploy Tests
    needs: deploy-staging
    if: needs.deploy-staging.result == 'success'
    uses: ./.github/workflows/post-deploy-tests.yml
    with:
      environment: staging
      deploy_url: https://dnd-recorder-staging.fly.dev
    secrets: inherit
