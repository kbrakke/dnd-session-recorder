name: Deploy Review App
on:
  # Run this workflow on every PR event. Existing review apps will be updated when the PR is updated.
  pull_request:
    types: [opened, reopened, synchronize, closed]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
  FLY_REGION: bos
  FLY_ORG: personal
  NODE_VERSION: '22'

jobs:
  review_app:
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    # Only run one deployment at a time per PR.
    concurrency:
      group: pr-${{ github.event.number }}

    # Deploying apps with this "review" environment allows the URL for the app to be displayed in the PR UI.
    environment:
      name: review
      # The script in the `deploy` sets the URL output for each review app.
      url: ${{ steps.deploy.outputs.url }}
    
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Deploy PR app to Fly.io
        id: deploy
        uses: superfly/fly-pr-review-apps@1.2.1
        with:
          name: pr-${{ github.event.number }}-dnd-rec
          config: fly.review.toml
          secrets: |
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET_STAGING }}
            OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
            NEXT_PUBLIC_ENVIRONMENT=review
          vmsize: shared-cpu-1x
          memory: 512
          cpu: 1

  test_review_app:
    runs-on: ubuntu-latest
    needs: review_app
    if: github.event.action != 'closed'
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for app to be ready
        run: |
          echo "Waiting for review app to be ready..."
          for i in {1..30}; do
            if curl -f -s ${{ needs.review_app.outputs.url }}/api/health; then
              echo "✅ App is ready!"
              break
            fi
            echo "⏳ Waiting... (attempt $i/30)"
            sleep 10
          done

      - name: Run post-deploy tests
        run: npm run test:post-deploy
        env:
          DEPLOY_URL: ${{ needs.review_app.outputs.url }}
          CI: true
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET_STAGING }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: review-app-test-results-${{ github.event.number }}
          path: |
            test-results-post-deploy/
            playwright-report/
          retention-days: 7

      - name: Comment test results on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('## 🚀 Review App Deployed')
            );
            
            const testStatus = '${{ job.status }}';
            const appUrl = '${{ needs.review_app.outputs.url }}';
            
            const body = `## 🚀 Review App Deployed
            
            **App URL:** ${appUrl}
            **Post-Deploy Tests:** ${testStatus === 'success' ? '✅ Passed' : '❌ Failed'}
            
            ### Quick Links
            - 🏠 [Home Page](${appUrl})
            - 🔐 [Sign In](${appUrl}/auth/signin)
            - 🎯 [Health Check](${appUrl}/api/health)
            
            ${testStatus === 'success' ? 
              '### ✅ All post-deploy tests passed!\nThe review app is ready for testing.' : 
              '### ⚠️ Some post-deploy tests failed\nPlease check the test results in the Actions tab.'
            }
            
            ---
            *Review app will be automatically destroyed when the PR is closed.*`;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }